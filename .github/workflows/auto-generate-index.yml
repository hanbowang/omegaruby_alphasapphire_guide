name: Auto Generate docs/index.html

on:
  push:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  generate-index:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.x'

      - name: Regenerate guide
        run: python3 scripts/generate_guide.py

      - name: Commit and push docs/index.html if changed
        run: |
          if git diff --quiet -- docs/index.html; then
            echo "docs/index.html is up to date"
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add docs/index.html
          git commit -m "chore: auto-generate docs/index.html"
          git push
